version: 1
send_anonymous_usage_stats: true
plugins:
  extractors:
    - name: tap-csv
      variant: meltanolabs
      pip_url: meltanolabs-tap-csv
  loaders:
    - name: target-gcs
      namespace: target_gcs
      pip_url: -e .
      settings:
        - name: bucket_name
        - name: date_format
        - name: key_prefix
        - name: key_naming_convention
        - name: max_records_per_file
        - name: partition_date_field
        - name: partition_date_format
      config:
        bucket_name: your-gcs-bucket
        date_format: "%Y-%m-%d"
        key_prefix: output
        key_naming_convention: "{stream}/{partition_date}/{timestamp}.jsonl"
        max_records_per_file: 1000
        partition_date_field: created_at
        partition_date_format: "year=%Y/month=%m/day=%d"
