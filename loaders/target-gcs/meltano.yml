version: 1
send_anonymous_usage_stats: true
plugins:
  extractors:
    - name: tap-csv
      variant: meltanolabs
      pip_url: meltanolabs-tap-csv
  loaders:
    - name: target-gcs
      namespace: target_gcs
      pip_url: -e .
      settings:
        - name: bucket_name
        - name: date_format
        - name: key_prefix
        - name: max_records_per_file
        - name: hive_partitioned
      config:
        bucket_name: your-gcs-bucket
        date_format: "%Y-%m-%d"
        key_prefix: output
        max_records_per_file: 1000
        hive_partitioned: false
