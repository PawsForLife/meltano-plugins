# Run unit tests for each discovered tap/target plugin. Uses inline env setup (no install.sh) for CI.
name: Plugin unit tests (matrix)

on:
  pull_request:
    branches: [main, release]
    paths:
      - "scripts/**"
      - "taps/**"
      - "loaders/**"
      - ".github/**"

jobs:
  discover:
    runs-on: self-hosted
    outputs:
      packages: ${{ steps.discover.outputs.packages }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run plugin package discovery and set matrix output
        id: discover
        run: |
          PACKAGES=$(python scripts/list_packages.py .)
          echo "packages<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PACKAGES" | jq -R -s -c 'split("\n") | map(select(length > 0)) | {path: .}' >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run script tests
        run: |
          pip install pytest
          pytest scripts/tests -v

  test:
    needs: discover
    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.packages) }}
      fail-fast: false
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@v4

      - name: Create venv and install dependencies
        working-directory: ${{ matrix.path }}
        run: |
          uv venv --python 3.12
          uv sync --extra dev

      - name: Ruff check
        working-directory: ${{ matrix.path }}
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: ${{ matrix.path }}
        run: uv run ruff format --check .

      - name: Mypy
        working-directory: ${{ matrix.path }}
        run: uv run mypy .

      - name: Pytest
        working-directory: ${{ matrix.path }}
        run: uv run pytest
