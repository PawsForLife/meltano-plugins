[mypy]
python_version = 3.12
warn_unused_configs = True
# Temporary until tasks 02–07 align context type with supertype Mapping[str, Any] | None.
disable_error_code = override
warn_return_any = True
exclude = tests

[mypy-singer.*]
# Library 'pipelinewise-singer-tools' does not have type hints:
# - https://github.com/transferwise/pipelinewise-singer-python/issues/25
ignore_missing_imports = True

[mypy-backoff.*]
# Frozen due to pipelinewise-singer-tools dependency
ignore_missing_imports = True

[mypy-bcrypt.*]
ignore_missing_imports = True

[mypy-boto3.*]
ignore_missing_imports = True

[mypy-joblib.*]
ignore_missing_imports = True

[mypy-pyarrow.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-jsonschema.*]
ignore_missing_imports = True

[mypy-jsonpath_ng.*]
ignore_missing_imports = True

[mypy-genson.*]
ignore_missing_imports = True

[mypy-requests_aws4auth.*]
ignore_missing_imports = True
